<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="">
        <label for="">Full Name:</label><br>
        <input type="text" placeholder="Enter your name" required>
        <br><br>

        <label for="email">Email:</label><br>
        <input type="email" placeholder="Enter your email" required>
        <br><br>

        <label for="">Password:</label><br>
        <input type="password" required>
        <br><br>

        <label>Gender:</label><br>
        <label for="male"><input type="radio" name ="Gender" id="male" required>Male</label>
        <label for="female"><input type="radio" name ="Gender" id="female" required>Female</label>
        <br><br>

        <label for="">Skills:</label><br>
        <input type="checkbox" id="html" name="skills" value="HTML" required>
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skills" value="CSS" required>
        <label for="css">CSS</label>

        <input type="checkbox" id="java script" name="skills" value="Java Script" required>
        <label for="java script">Java Script</label>
        <br><br>
        
        <label for="">Date of Birth:</label><br>
        <input type="date" placehoder="yyyy-mm-dd" required>
        <br><br>

         <button type="submit">Register</button>
    </form>

    <table>

    <h2>Submitted Students (Dummy Data)</h2>

    <table border="1" cellpadding="10" cellspacing="0">

        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Skills</th>
            <th>Date of Birth</th>
        </tr>

        </tr>
    </table>
</body>
</html>
